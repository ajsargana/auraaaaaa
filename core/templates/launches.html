
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- PWA / iOS App Meta Tags -->
    <link rel="manifest" href="/static/manifest.json">
    <meta name="theme-color" content="#1a1a2e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="AURA-AI">
    <link rel="apple-touch-icon" href="/static/icons/icon-192.png">
    <link rel="apple-touch-icon" sizes="512x512" href="/static/icons/icon-512.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Rocket Launches - AURA-AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #0c0c0c 0%, #1a1a2e 50%, #16213e 100%);
            color: #e2e8f0;
            min-height: 100vh;
        }

        .back-button {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 1000;
            padding: 10px 20px;
            background: rgba(100, 181, 246, 0.2);
            border: 1px solid rgba(100, 181, 246, 0.3);
            border-radius: 8px;
            color: #64b5f6;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .back-button:hover {
            background: rgba(100, 181, 246, 0.3);
            transform: translateX(-5px);
        }

        .launches-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 80px 20px 40px;
        }

        .launches-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .launches-title {
            font-size: 3rem;
            font-weight: 700;
            background: linear-gradient(135deg, #64b5f6, #42a5f5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .loading-spinner {
            text-align: center;
            padding: 60px 20px;
            font-size: 1.2rem;
        }

        .analytics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .analytics-card {
            background: linear-gradient(135deg, rgba(26, 26, 46, 0.9), rgba(12, 12, 12, 0.9));
            border: 1px solid rgba(100, 181, 246, 0.3);
            border-radius: 12px;
            padding: 20px;
            backdrop-filter: blur(10px);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .analytics-card:hover {
            border-color: #64b5f6;
            transform: translateY(-5px);
            box-shadow: 0 8px 32px rgba(100, 181, 246, 0.2);
        }

        .analytics-card h3 {
            color: #64b5f6;
            font-size: 1.2rem;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .stat-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .stat-item:last-child {
            border-bottom: none;
        }

        .launches-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
        }

        @media (max-width: 768px) {
            .launches-container {
                padding: 60px 10px 20px;
            }

            .launches-title {
                font-size: 2rem;
            }

            .back-button {
                top: 10px;
                left: 10px;
                padding: 8px 12px;
                font-size: 0.85rem;
            }

            .analytics-grid {
                grid-template-columns: 1fr;
                gap: 15px;
            }

            .launches-grid {
                grid-template-columns: 1fr;
                gap: 15px;
            }

            .launch-card {
                padding: 15px;
            }

            .launch-name {
                font-size: 1rem;
            }

            .launch-time {
                font-size: 0.95rem;
            }

            .launch-detail {
                font-size: 0.85rem;
            }

            .analytics-card h3 {
                font-size: 1rem;
            }

            .stat-item {
                font-size: 0.85rem;
            }
        }

        @media (max-width: 480px) {
            .launches-title {
                font-size: 1.5rem;
            }

            .launch-image {
                height: 150px;
            }
        }

        .launch-card {
            background: linear-gradient(135deg, rgba(26, 26, 46, 0.9), rgba(12, 12, 12, 0.9));
            border: 1px solid rgba(100, 181, 246, 0.2);
            border-radius: 12px;
            padding: 20px;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .launch-card:hover {
            border-color: #64b5f6;
            transform: translateY(-5px);
            box-shadow: 0 8px 32px rgba(100, 181, 246, 0.2);
        }

        .launch-image {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 8px;
            margin-bottom: 15px;
        }

        .launch-name {
            font-size: 1.2rem;
            font-weight: 600;
            color: #64b5f6;
            margin-bottom: 10px;
        }

        .launch-time {
            color: #4caf50;
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .launch-detail {
            display: flex;
            justify-content: space-between;
            padding: 5px 0;
            font-size: 0.9rem;
        }

        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: 600;
            margin-top: 10px;
        }

        .status-go {
            background: rgba(76, 175, 80, 0.2);
            color: #4caf50;
            border: 1px solid #4caf50;
        }

        .status-tbd {
            background: rgba(255, 152, 0, 0.2);
            color: #ff9800;
            border: 1px solid #ff9800;
        }

        /* Analytics Modal */
        .analytics-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            z-index: 2000;
            overflow-y: auto;
            padding: 20px;
        }

        .analytics-modal-content {
            max-width: 900px;
            margin: 50px auto;
            background: linear-gradient(135deg, rgba(26, 26, 46, 0.95), rgba(12, 12, 12, 0.95));
            border: 1px solid rgba(100, 181, 246, 0.3);
            border-radius: 15px;
            padding: 30px;
            backdrop-filter: blur(15px);
        }

        /* Launch Details Modal */
        .launch-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.85);
            z-index: 2000;
            overflow-y: auto;
            padding: 20px;
        }

        .launch-modal-content {
            max-width: 800px;
            margin: 50px auto;
            background: linear-gradient(135deg, rgba(26, 26, 46, 0.98), rgba(12, 12, 12, 0.98));
            border: 2px solid rgba(100, 181, 246, 0.4);
            border-radius: 20px;
            overflow: hidden;
            backdrop-filter: blur(20px);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        .modal-header-custom {
            background: linear-gradient(135deg, rgba(100, 181, 246, 0.2), rgba(66, 165, 245, 0.2));
            padding: 25px 30px;
            border-bottom: 1px solid rgba(100, 181, 246, 0.3);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-header-custom h2 {
            color: #64b5f6;
            font-size: 1.8rem;
            margin: 0;
            font-weight: 700;
        }

        .modal-close-btn {
            background: rgba(244, 67, 54, 0.2);
            border: 1px solid rgba(244, 67, 54, 0.5);
            color: #ff6b6b;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 1.2rem;
        }

        .modal-close-btn:hover {
            background: rgba(244, 67, 54, 0.4);
            transform: scale(1.1);
        }

        .modal-body-custom {
            padding: 30px;
        }

        .modal-image {
            width: 100%;
            height: 300px;
            object-fit: cover;
            border-radius: 12px;
            margin-bottom: 25px;
        }

        .modal-section {
            background: rgba(255, 255, 255, 0.02);
            border-left: 3px solid rgba(100, 181, 246, 0.5);
            padding: 15px 20px;
            margin-bottom: 20px;
            border-radius: 8px;
        }

        .modal-section h5 {
            color: #64b5f6;
            font-size: 1.2rem;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .modal-detail-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .modal-detail-item:last-child {
            border-bottom: none;
        }

        .modal-detail-label {
            color: #94a3b8;
            font-weight: 500;
        }

        .modal-detail-value {
            color: #e2e8f0;
            font-weight: 600;
        }

        .modal-footer-custom {
            padding: 20px 30px;
            background: rgba(255, 255, 255, 0.02);
            border-top: 1px solid rgba(100, 181, 246, 0.3);
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .modal-btn {
            padding: 12px 24px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .modal-btn-primary {
            background: linear-gradient(135deg, #64b5f6, #42a5f5);
            color: white;
        }

        .modal-btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(100, 181, 246, 0.4);
        }

        .modal-btn-secondary {
            background: rgba(100, 181, 246, 0.2);
            color: #64b5f6;
            border: 1px solid rgba(100, 181, 246, 0.3);
        }

        .modal-btn-secondary:hover {
            background: rgba(100, 181, 246, 0.3);
        }
    </style>
</head>
<body>
    <a href="/tracker" class="back-button">
        <i class="fas fa-arrow-left me-2"></i>Back to Tracker
    </a>

    <div class="launches-container">
        <div class="launches-header">
            <h1 class="launches-title">
                <i class="fas fa-rocket me-3"></i>
                Rocket Launches
            </h1>
            <p class="mb-0">Upcoming launches and launch analytics</p>
        </div>

        <div id="loadingSpinner" class="loading-spinner">
            <div>
                <i class="fas fa-spinner fa-spin fa-2x me-3"></i>
                Loading launch data...
            </div>
        </div>

        <div id="analyticsContainer" class="analytics-grid" style="display: none;">
            <!-- Analytics will be inserted here -->
        </div>

        <div id="launchesGrid" class="launches-grid" style="display: none;">
            <!-- Launches will be inserted here -->
        </div>
    </div>

    <!-- Analytics Modal -->
    <div id="analyticsModal" class="analytics-modal">
        <div class="analytics-modal-content">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h3 id="analyticsModalTitle" class="text-info mb-0"></h3>
                <button class="modal-close-btn" onclick="closeAnalyticsModal()">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div id="analyticsModalBody">
                <!-- Full analytics will be loaded here -->
            </div>
        </div>
    </div>

    <!-- Launch Details Modal -->
    <div id="launchModal" class="launch-modal">
        <div class="launch-modal-content">
            <div class="modal-header-custom">
                <h2 id="launchModalTitle"></h2>
                <button class="modal-close-btn" onclick="closeLaunchModal()">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="modal-body-custom" id="launchModalBody">
                <!-- Launch details will be loaded here -->
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let allLaunches = [];
        let analyticsData = {};

        document.addEventListener('DOMContentLoaded', async function() {
            await loadLaunchData();
        });

        async function loadLaunchData() {
            try {
                console.log('Loading launch data...');

                const [launchesResponse, analyticsResponse] = await Promise.all([
                    fetch('/api/launches/upcoming?limit=50'),
                    fetch('/api/launches/analytics')
                ]);

                const launchesData = await launchesResponse.json();
                const analyticsDataResponse = await analyticsResponse.json();

                if (launchesData.success && analyticsDataResponse.success) {
                    allLaunches = launchesData.launches;
                    analyticsData = analyticsDataResponse.analytics;
                    displayAnalytics(analyticsData);
                    displayLaunches(launchesData.launches);
                } else {
                    showError('Failed to load launch data');
                }

            } catch (error) {
                console.error('Error loading launches:', error);
                showError(`Network error: ${error.message}`);
            }
        }

        function displayAnalytics(analytics) {
            const container = document.getElementById('analyticsContainer');

            const top5Rockets = Object.entries(analytics.by_rocket).slice(0, 5);
            const top5Countries = Object.entries(analytics.by_country).slice(0, 5);
            const top5Locations = Object.entries(analytics.by_location).slice(0, 5);
            const missionTypes = Object.entries(analytics.by_mission_type).slice(0, 5);

            container.innerHTML = `
                <div class="analytics-card" onclick="showAllAnalytics('by_rocket', 'Top Launch Vehicles')">
                    <h3>
                        <span><i class="fas fa-rocket me-2"></i>Top Launch Vehicles</span>
                        <i class="fas fa-expand-alt"></i>
                    </h3>
                    ${top5Rockets.map(([name, count]) => `
                        <div class="stat-item">
                            <span>${name}</span>
                            <span class="badge bg-primary">${count}</span>
                        </div>
                    `).join('')}
                    <small class="text-muted mt-2 d-block">Click to view all</small>
                </div>

                <div class="analytics-card" onclick="showAllAnalytics('by_country', 'Launches by Country')">
                    <h3>
                        <span><i class="fas fa-flag me-2"></i>Launches by Country</span>
                        <i class="fas fa-expand-alt"></i>
                    </h3>
                    ${top5Countries.map(([country, count]) => `
                        <div class="stat-item">
                            <span>${country}</span>
                            <span class="badge bg-success">${count}</span>
                        </div>
                    `).join('')}
                    <small class="text-muted mt-2 d-block">Click to view all</small>
                </div>

                <div class="analytics-card" onclick="showAllAnalytics('by_location', 'Top Launch Sites')">
                    <h3>
                        <span><i class="fas fa-map-marker-alt me-2"></i>Top Launch Sites</span>
                        <i class="fas fa-expand-alt"></i>
                    </h3>
                    ${top5Locations.map(([location, count]) => `
                        <div class="stat-item">
                            <span>${location}</span>
                            <span class="badge bg-info">${count}</span>
                        </div>
                    `).join('')}
                    <small class="text-muted mt-2 d-block">Click to view all</small>
                </div>

                <div class="analytics-card" onclick="showAllAnalytics('by_mission_type', 'Mission Types')">
                    <h3>
                        <span><i class="fas fa-satellite me-2"></i>Mission Types</span>
                        <i class="fas fa-expand-alt"></i>
                    </h3>
                    ${missionTypes.map(([type, count]) => `
                        <div class="stat-item">
                            <span>${type}</span>
                            <span class="badge bg-warning">${count}</span>
                        </div>
                    `).join('')}
                    <small class="text-muted mt-2 d-block">Click to view all</small>
                </div>
            `;

            container.style.display = 'grid';
            document.getElementById('loadingSpinner').style.display = 'none';
        }

        function showAllAnalytics(category, title) {
            const data = analyticsData[category];
            // Sort in descending order by count (highest first)
            const entries = Object.entries(data).sort((a, b) => b[1] - a[1]);

            const modalBody = document.getElementById('analyticsModalBody');
            
            let badgeClass = 'bg-primary';
            if (category === 'by_country') badgeClass = 'bg-success';
            else if (category === 'by_location') badgeClass = 'bg-info';
            else if (category === 'by_mission_type') badgeClass = 'bg-warning';

            modalBody.innerHTML = `
                <div class="row">
                    ${entries.map(([name, count], index) => `
                        <div class="col-md-6 mb-2">
                            <div class="stat-item">
                                <span><strong>#${index + 1}</strong> ${name}</span>
                                <span class="badge ${badgeClass}">${count}</span>
                            </div>
                        </div>
                    `).join('')}
                </div>
                <div class="mt-3">
                    <strong>Total Items: ${entries.length}</strong>
                </div>
            `;

            document.getElementById('analyticsModalTitle').textContent = title;
            document.getElementById('analyticsModal').style.display = 'block';
        }

        function closeAnalyticsModal() {
            document.getElementById('analyticsModal').style.display = 'none';
        }

        function displayLaunches(launches) {
            const grid = document.getElementById('launchesGrid');

            grid.innerHTML = launches.map(launch => {
                const launchTime = new Date(launch.net);
                const timeUntil = getTimeUntil(launchTime);
                const statusClass = launch.status.includes('Go') ? 'status-go' : 'status-tbd';

                return `
                    <div class="launch-card" onclick='openLaunchDetails(${JSON.stringify(launch).replace(/'/g, "&apos;")})'>
                        ${launch.image ? `<img src="${launch.image}" class="launch-image" alt="${launch.name}">` : ''}
                        <div class="launch-name">${launch.name}</div>
                        <div class="launch-time">
                            <i class="fas fa-clock me-2"></i>${timeUntil}
                        </div>
                        <div class="launch-detail">
                            <span><i class="fas fa-rocket me-2"></i>Rocket:</span>
                            <span>${launch.rocket.name}</span>
                        </div>
                        <div class="launch-detail">
                            <span><i class="fas fa-map-marker-alt me-2"></i>Location:</span>
                            <span>${launch.pad.location}</span>
                        </div>
                        <div class="launch-detail">
                            <span><i class="fas fa-building me-2"></i>Agency:</span>
                            <span>${launch.agency.name}</span>
                        </div>
                        ${launch.probability ? `
                        <div class="launch-detail">
                            <span><i class="fas fa-percentage me-2"></i>Success Prob:</span>
                            <span>${launch.probability}%</span>
                        </div>
                        ` : ''}
                        <span class="status-badge ${statusClass}">${launch.status}</span>
                    </div>
                `;
            }).join('');

            grid.style.display = 'grid';
        }

        function getTimeUntil(launchTime) {
            const now = new Date();
            const diff = launchTime - now;

            if (diff < 0) {
                return 'LAUNCHED';
            }

            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));

            if (days > 0) {
                return `in ${days} day${days > 1 ? 's' : ''} ${hours}h`;
            } else if (hours > 0) {
                return `in ${hours}h ${minutes}m`;
            } else {
                return `in ${minutes} minute${minutes > 1 ? 's' : ''}`;
            }
        }

        function openLaunchDetails(launch) {
            const launchTime = new Date(launch.net);
            const timeUntil = getTimeUntil(launchTime);
            
            document.getElementById('launchModalTitle').textContent = launch.name;
            
            const modalBody = document.getElementById('launchModalBody');
            modalBody.innerHTML = `
                ${launch.image ? `<img src="${launch.image}" class="modal-image" alt="${launch.name}">` : ''}
                
                <div class="modal-section">
                    <h5><i class="fas fa-clock"></i> Launch Schedule</h5>
                    <div class="modal-detail-item">
                        <span class="modal-detail-label">Launch Time:</span>
                        <span class="modal-detail-value">${launchTime.toLocaleString()}</span>
                    </div>
                    <div class="modal-detail-item">
                        <span class="modal-detail-label">Time Until Launch:</span>
                        <span class="modal-detail-value">${timeUntil}</span>
                    </div>
                    <div class="modal-detail-item">
                        <span class="modal-detail-label">Status:</span>
                        <span class="modal-detail-value">${launch.status}</span>
                    </div>
                    ${launch.probability ? `
                    <div class="modal-detail-item">
                        <span class="modal-detail-label">Success Probability:</span>
                        <span class="modal-detail-value">${launch.probability}%</span>
                    </div>
                    ` : ''}
                </div>

                <div class="modal-section">
                    <h5><i class="fas fa-rocket"></i> Vehicle Information</h5>
                    <div class="modal-detail-item">
                        <span class="modal-detail-label">Rocket Name:</span>
                        <span class="modal-detail-value">${launch.rocket.name}</span>
                    </div>
                    ${launch.rocket.family ? `
                    <div class="modal-detail-item">
                        <span class="modal-detail-label">Family:</span>
                        <span class="modal-detail-value">${launch.rocket.family}</span>
                    </div>
                    ` : ''}
                    ${launch.rocket.variant ? `
                    <div class="modal-detail-item">
                        <span class="modal-detail-label">Variant:</span>
                        <span class="modal-detail-value">${launch.rocket.variant}</span>
                    </div>
                    ` : ''}
                </div>

                <div class="modal-section">
                    <h5><i class="fas fa-satellite"></i> Mission Details</h5>
                    <div class="modal-detail-item">
                        <span class="modal-detail-label">Mission Name:</span>
                        <span class="modal-detail-value">${launch.mission.name}</span>
                    </div>
                    <div class="modal-detail-item">
                        <span class="modal-detail-label">Mission Type:</span>
                        <span class="modal-detail-value">${launch.mission.type}</span>
                    </div>
                    ${launch.mission.description ? `
                    <div class="mt-3">
                        <p class="text-muted">${launch.mission.description}</p>
                    </div>
                    ` : ''}
                </div>

                <div class="modal-section">
                    <h5><i class="fas fa-map-marker-alt"></i> Launch Site</h5>
                    <div class="modal-detail-item">
                        <span class="modal-detail-label">Pad:</span>
                        <span class="modal-detail-value">${launch.pad.name}</span>
                    </div>
                    <div class="modal-detail-item">
                        <span class="modal-detail-label">Location:</span>
                        <span class="modal-detail-value">${launch.pad.location}</span>
                    </div>
                    <div class="modal-detail-item">
                        <span class="modal-detail-label">Country:</span>
                        <span class="modal-detail-value">${launch.pad.country}</span>
                    </div>
                </div>

                <div class="modal-section">
                    <h5><i class="fas fa-building"></i> Launch Provider</h5>
                    <div class="modal-detail-item">
                        <span class="modal-detail-label">Agency:</span>
                        <span class="modal-detail-value">${launch.agency.name}</span>
                    </div>
                    <div class="modal-detail-item">
                        <span class="modal-detail-label">Type:</span>
                        <span class="modal-detail-value">${launch.agency.type}</span>
                    </div>
                    <div class="modal-detail-item">
                        <span class="modal-detail-label">Country:</span>
                        <span class="modal-detail-value">${launch.agency.country}</span>
                    </div>
                </div>

                <div class="modal-footer-custom">
                    ${launch.video_url ? `
                    <button class="modal-btn modal-btn-primary" onclick="window.open('${launch.video_url}', '_blank')">
                        <i class="fas fa-video"></i> Watch Live Stream
                    </button>
                    ` : ''}
                    <button class="modal-btn modal-btn-secondary" onclick="closeLaunchModal()">
                        <i class="fas fa-times"></i> Close
                    </button>
                </div>
            `;

            document.getElementById('launchModal').style.display = 'block';
        }

        function closeLaunchModal() {
            document.getElementById('launchModal').style.display = 'none';
        }

        // Close modals when clicking outside
        document.getElementById('analyticsModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeAnalyticsModal();
            }
        });

        document.getElementById('launchModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeLaunchModal();
            }
        });

        function showError(message) {
            document.getElementById('loadingSpinner').innerHTML = `
                <div class="alert alert-danger">
                    <i class="fas fa-exclamation-triangle me-2"></i>
                    ${message}
                </div>
            `;
        }
    </script>
<script>
if ("serviceWorker" in navigator) {
  window.addEventListener("load", function() {
    navigator.serviceWorker.register("/static/service-worker.js").catch(function() {});
  });
}
</script>
</body>
</html>
