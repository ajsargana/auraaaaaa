<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- PWA / iOS App Meta Tags -->
    <link rel="manifest" href="/static/manifest.json">
    <meta name="theme-color" content="#1a1a2e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="SkyScope">
    <link rel="apple-touch-icon" href="/static/icons/icon-192.png">
    <link rel="apple-touch-icon" sizes="512x512" href="/static/icons/icon-512.png">
    <title>SkyScope - Satellite Passes</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://bootswatch.com/5/darkly/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body {
            background: linear-gradient(135deg, #0c0c0c 0%, #1a1a2e 50%, #16213e 100%);
            min-height: 100vh;
        }

        .info-panel {
            background: linear-gradient(135deg, rgba(26, 26, 46, 0.95) 0%, rgba(12, 12, 12, 0.95) 100%);
            border: 1px solid rgba(100, 181, 246, 0.3);
            border-radius: 15px;
            padding: 20px;
            backdrop-filter: blur(15px);
        }

        .navbar {
            background: linear-gradient(90deg, rgba(0, 0, 0, 0.9) 0%, rgba(26, 26, 46, 0.9) 100%) !important;
            backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(100, 181, 246, 0.2);
        }

        .pass-item {
            background: rgba(255, 255, 255, 0.05);
            border-left: 3px solid #64b5f6;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
            transition: all 0.3s ease;
        }

        .pass-item:hover {
            background: rgba(100, 181, 246, 0.1);
            border-left-color: #ffc107;
        }

        .loading-spinner {
            border: 4px solid rgba(100, 181, 246, 0.3);
            border-top: 4px solid #64b5f6;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/">
                <i class="fas fa-satellite-dish me-2"></i>
                SkyScope
                <small class="text-muted ms-2">Cached Pass Predictions</small>
            </a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="/">
                    <i class="fas fa-globe me-1"></i>Live Tracker
                </a>
            </div>
        </div>
    </nav>

    <div class="container-fluid mt-4">
        <div class="row">
            <!-- Input Panel -->
            <div class="col-md-4">
                <div class="info-panel mb-4">
                    <h5 class="text-primary mb-3">
                        <i class="fas fa-map-marker-alt me-2"></i>Location Settings
                    </h5>
                    <div class="mb-3">
                        <label class="form-label text-muted">Latitude</label>
                        <input type="number" class="form-control" id="latitude" step="0.0001" placeholder="e.g., 40.7128" value="0">
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-muted">Longitude</label>
                        <input type="number" class="form-control" id="longitude" step="0.0001" placeholder="e.g., -74.0060" value="0">
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-muted">Altitude (m)</label>
                        <input type="number" class="form-control" id="altitude" step="1" placeholder="0" value="0">
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-muted">Time Window</label>
                        <select class="form-select" id="timeWindow">
                            <option value="12">Next 12 hours</option>
                            <option value="24" selected>Next 24 hours</option>
                            <option value="48">Next 48 hours</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-muted">Min Elevation (°)</label>
                        <input type="number" class="form-control" id="minElevation" min="0" max="90" value="10">
                    </div>
                    <button class="btn btn-primary w-100" id="searchBtn">
                        <i class="fas fa-search me-2"></i>Search Passes
                    </button>
                </div>

                <!-- Status Panel -->
                <div class="info-panel" id="statusPanel" style="display: none;">
                    <h6 class="text-success mb-2">
                        <i class="fas fa-info-circle me-2"></i>Search Results
                    </h6>
                    <div id="statusInfo"></div>
                </div>
            </div>

            <!-- Results Panel -->
            <div class="col-md-8">
                <div class="info-panel">
                    <h5 class="text-warning mb-3">
                        <i class="fas fa-satellite me-2"></i>Satellite Passes
                    </h5>
                    <div id="resultsContainer">
                        <div class="text-center text-muted py-5">
                            <i class="fas fa-search" style="font-size: 4rem; opacity: 0.5;"></i>
                            <p class="mt-3">Enter your coordinates and click "Search Passes" to find satellites</p>
                            <small class="text-info">
                                <i class="fas fa-bolt me-1"></i>
                                Using cached position data for 10-100x faster results
                            </small>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        document.getElementById('searchBtn').addEventListener('click', async () => {
            const lat = parseFloat(document.getElementById('latitude').value);
            const lon = parseFloat(document.getElementById('longitude').value);
            const alt = parseFloat(document.getElementById('altitude').value);
            const timeWindow = parseInt(document.getElementById('timeWindow').value);
            const minElevation = parseFloat(document.getElementById('minElevation').value);

            // Validate inputs
            if (isNaN(lat) || isNaN(lon) || Math.abs(lat) > 90 || Math.abs(lon) > 180) {
                alert('Please enter valid coordinates');
                return;
            }

            // Show loading
            document.getElementById('resultsContainer').innerHTML = `
                <div class="text-center py-5">
                    <div class="loading-spinner"></div>
                    <p class="text-info mt-3">Searching cached positions...</p>
                    <small class="text-muted">This may take 10-30 seconds</small>
                </div>
            `;

            try {
                const response = await fetch('/api/passes/cached', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        lat: lat,
                        lon: lon,
                        alt: alt,
                        time_window_hours: timeWindow,
                        min_elevation: minElevation
                    })
                });

                const data = await response.json();

                if (data.success) {
                    displayResults(data);
                } else {
                    document.getElementById('resultsContainer').innerHTML = `
                        <div class="alert alert-danger">
                            <i class="fas fa-exclamation-triangle me-2"></i>
                            ${data.error}
                        </div>
                    `;
                }
            } catch (error) {
                document.getElementById('resultsContainer').innerHTML = `
                    <div class="alert alert-danger">
                        <i class="fas fa-exclamation-triangle me-2"></i>
                        Error: ${error.message}
                    </div>
                `;
            }
        });

        function displayResults(data) {
            const container = document.getElementById('resultsContainer');
            const statusPanel = document.getElementById('statusPanel');
            const statusInfo = document.getElementById('statusInfo');

            // Show status
            statusPanel.style.display = 'block';
            statusInfo.innerHTML = `
                <small class="text-muted">Satellites found:</small> <strong class="text-success">${data.total_satellites_with_passes}</strong><br>
                <small class="text-muted">Total passes:</small> <strong class="text-warning">${data.total_passes}</strong><br>
                <small class="text-muted">Cache hits:</small> <strong class="text-info">${data.cache_hits}</strong><br>
                <small class="text-muted">Time window:</small> <strong>${data.time_window_hours}h</strong>
            `;

            if (data.passes.length === 0) {
                container.innerHTML = `
                    <div class="text-center text-muted py-5">
                        <i class="fas fa-satellite" style="font-size: 4rem; opacity: 0.5;"></i>
                        <p class="mt-3">No passes found for this location and time window</p>
                        <small>Try increasing the time window or lowering the minimum elevation</small>
                    </div>
                `;
                return;
            }

            let html = '';
            data.passes.forEach(sat => {
                html += `
                    <div class="pass-item">
                        <div class="d-flex justify-content-between align-items-center mb-2">
                            <strong class="text-info">${sat.name}</strong>
                            <span class="badge bg-secondary">${sat.category}</span>
                        </div>
                        <div class="text-muted mb-2">
                            <small><i class="fas fa-hashtag me-1"></i>NORAD ${sat.norad_id}</small>
                        </div>
                `;

                sat.passes.forEach((pass, idx) => {
                    const startTime = new Date(pass.start);
                    const maxElev = pass.max_elevation;
                    const elevClass = maxElev > 30 ? 'text-success' : 'text-warning';

                    html += `
                        <div class="ms-3 mb-2 pb-2 ${idx < sat.passes.length - 1 ? 'border-bottom' : ''}">
                            <div class="row g-2">
                                <div class="col-6">
                                    <small class="text-muted">Start:</small><br>
                                    <small class="text-primary">${startTime.toLocaleString()}</small>
                                </div>
                                <div class="col-6">
                                    <small class="text-muted">Max Elevation:</small><br>
                                    <small class="${elevClass}">${maxElev.toFixed(1)}°</small>
                                </div>
                                <div class="col-6">
                                    <small class="text-muted">Duration:</small><br>
                                    <small class="text-info">${pass.duration_seconds} sec</small>
                                </div>
                                <div class="col-6">
                                    <small class="text-muted">Azimuth:</small><br>
                                    <small class="text-warning">${pass.start_azimuth?.toFixed(1)}° → ${pass.end_azimuth?.toFixed(1)}°</small>
                                </div>
                            </div>
                        </div>
                    `;
                });

                html += `</div>`;
            });

            container.innerHTML = html;
        }

        // Try to get user's location
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
                (position) => {
                    document.getElementById('latitude').value = position.coords.latitude.toFixed(4);
                    document.getElementById('longitude').value = position.coords.longitude.toFixed(4);
                },
                (error) => {
                    console.warn('Geolocation failed:', error);
                }
            );
        }
    </script>
<script>
if ("serviceWorker" in navigator) {
  window.addEventListener("load", function() {
    navigator.serviceWorker.register("/static/service-worker.js").catch(function() {});
  });
}
</script>
</body>
</html>
