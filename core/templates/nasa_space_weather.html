
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- PWA / iOS App Meta Tags -->
    <link rel="manifest" href="/static/manifest.json">
    <meta name="theme-color" content="#1a1a2e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="SkyScope">
    <link rel="apple-touch-icon" href="/static/icons/icon-192.png">
    <link rel="apple-touch-icon" sizes="512x512" href="/static/icons/icon-512.png">
    <title>Space Weather Dashboard - DONKI</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #0c0c0c 0%, #1a1a2e 50%, #16213e 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #e2e8f0;
            position: relative;
            overflow-x: hidden;
        }
        
        /* Animated star field background */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(2px 2px at 20px 30px, #fff, transparent),
                radial-gradient(2px 2px at 40px 70px, rgba(255,255,255,0.8), transparent),
                radial-gradient(1px 1px at 90px 40px, #fff, transparent),
                radial-gradient(1px 1px at 130px 80px, rgba(255,255,255,0.6), transparent),
                radial-gradient(2px 2px at 160px 30px, #fff, transparent);
            background-repeat: repeat;
            background-size: 200px 100px;
            animation: sparkle 3s linear infinite;
            z-index: 1;
            pointer-events: none;
        }
        
        @keyframes sparkle {
            from { transform: translateY(0px) translateX(0px); }
            to { transform: translateY(-100px) translateX(100px); }
        }
        
        .space-weather-container {
            background: linear-gradient(135deg, rgba(26, 26, 46, 0.95) 0%, rgba(12, 12, 12, 0.95) 100%);
            border-radius: 20px;
            box-shadow: 
                0 20px 60px rgba(0, 0, 0, 0.6),
                0 0 40px rgba(100, 181, 246, 0.1),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
            margin: 20px;
            padding: 30px;
            backdrop-filter: blur(15px);
            border: 1px solid rgba(100, 181, 246, 0.2);
            position: relative;
            z-index: 10;
        }
        
        .header-section {
            text-align: center;
            margin-bottom: 30px;
            padding: 25px;
            background: linear-gradient(135deg, rgba(30, 136, 229, 0.2) 0%, rgba(66, 165, 245, 0.2) 100%);
            color: #e2e8f0;
            border-radius: 15px;
            box-shadow: 
                0 10px 30px rgba(30, 136, 229, 0.2),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(30, 136, 229, 0.3);
            backdrop-filter: blur(10px);
        }
        
        .header-section h1 {
            background: linear-gradient(45deg, #64b5f6, #42a5f5, #1e88e5);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            text-shadow: 0 0 30px rgba(100, 181, 246, 0.3);
            margin-bottom: 15px;
        }
        
        .header-section p {
            color: rgba(255, 255, 255, 0.8);
            font-size: 1.1rem;
        }
        
        .event-category {
            background: linear-gradient(135deg, rgba(30, 41, 59, 0.8) 0%, rgba(15, 23, 42, 0.9) 100%);
            border-radius: 15px;
            padding: 25px;
            margin: 20px 0;
            box-shadow: 
                0 8px 25px rgba(0, 0, 0, 0.4),
                0 0 20px rgba(100, 181, 246, 0.1),
                inset 0 1px 0 rgba(255, 255, 255, 0.05);
            transition: all 0.3s ease;
            border: 1px solid rgba(100, 181, 246, 0.2);
            backdrop-filter: blur(10px);
        }
        
        .event-category:hover {
            transform: translateY(-8px);
            box-shadow: 
                0 15px 40px rgba(0, 0, 0, 0.6),
                0 0 30px rgba(100, 181, 246, 0.2);
            border-color: rgba(100, 181, 246, 0.4);
        }
        
        .event-category h3 {
            color: #64b5f6;
            border-bottom: 2px solid rgba(100, 181, 246, 0.3);
            padding-bottom: 12px;
            margin-bottom: 20px;
            font-weight: 600;
        }
        
        .event-item {
            background: linear-gradient(135deg, rgba(51, 65, 85, 0.6) 0%, rgba(30, 41, 59, 0.8) 100%);
            border-radius: 10px;
            padding: 18px;
            margin: 12px 0;
            border-left: 4px solid #64b5f6;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(100, 181, 246, 0.1);
        }
        
        .event-item:hover {
            background: linear-gradient(135deg, rgba(51, 65, 85, 0.8) 0%, rgba(30, 41, 59, 1) 100%);
            transform: translateX(8px);
            border-left-color: #42a5f5;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.4);
        }
        
        .summary-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 25px;
            margin: 30px 0;
        }
        
        .stat-card {
            background: linear-gradient(135deg, rgba(88, 28, 135, 0.8) 0%, rgba(139, 69, 190, 0.8) 100%);
            color: white;
            border-radius: 15px;
            padding: 30px;
            text-align: center;
            box-shadow: 
                0 10px 30px rgba(139, 69, 190, 0.3),
                inset 0 1px 0 rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
            border: 1px solid rgba(139, 69, 190, 0.4);
            backdrop-filter: blur(10px);
            position: relative;
            overflow: hidden;
        }
        
        .stat-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            transform: rotate(45deg);
            transition: all 0.5s ease;
            opacity: 0;
        }
        
        .stat-card:hover::before {
            animation: shimmer 0.5s ease-in-out;
        }
        
        @keyframes shimmer {
            0% { transform: translateX(-100%) translateY(-100%) rotate(45deg); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translateX(100%) translateY(100%) rotate(45deg); opacity: 0; }
        }
        
        .stat-card:hover {
            transform: scale(1.08) translateY(-5px);
            box-shadow: 
                0 20px 40px rgba(139, 69, 190, 0.4),
                0 0 30px rgba(139, 69, 190, 0.3);
        }
        
        .stat-number {
            font-size: 2.8rem;
            font-weight: bold;
            display: block;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
        }
        
        .loading-spinner {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 200px;
        }
        
        .loading-spinner .spinner-border {
            color: #64b5f6;
            width: 3rem;
            height: 3rem;
            animation: glow-pulse 2s ease-in-out infinite;
        }
        
        @keyframes glow-pulse {
            0%, 100% { 
                opacity: 1; 
                box-shadow: 0 0 20px rgba(100, 181, 246, 0.3);
            }
            50% { 
                opacity: 0.7; 
                box-shadow: 0 0 40px rgba(100, 181, 246, 0.6);
            }
        }
        
        .error-message {
            background: linear-gradient(135deg, rgba(220, 38, 38, 0.2) 0%, rgba(185, 28, 28, 0.3) 100%);
            color: #fecaca;
            border: 1px solid rgba(220, 38, 38, 0.4);
            border-radius: 10px;
            padding: 20px;
            margin: 20px 0;
            text-align: center;
            backdrop-filter: blur(10px);
        }
        
        .refresh-button {
            background: linear-gradient(135deg, rgba(34, 197, 94, 0.8) 0%, rgba(22, 163, 74, 0.9) 100%);
            border: none;
            color: white;
            padding: 15px 30px;
            border-radius: 25px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 
                0 8px 25px rgba(34, 197, 94, 0.3),
                inset 0 1px 0 rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(34, 197, 94, 0.5);
            font-weight: 600;
        }
        
        .refresh-button:hover {
            transform: translateY(-3px);
            box-shadow: 
                0 12px 35px rgba(34, 197, 94, 0.4),
                0 0 20px rgba(34, 197, 94, 0.3);
            background: linear-gradient(135deg, rgba(34, 197, 94, 1) 0%, rgba(22, 163, 74, 1) 100%);
        }
        
        .activity-level {
            display: inline-block;
            padding: 10px 18px;
            border-radius: 20px;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.9rem;
            backdrop-filter: blur(10px);
            border: 1px solid;
        }
        
        .activity-high { 
            background: linear-gradient(135deg, rgba(220, 38, 38, 0.3) 0%, rgba(185, 28, 28, 0.4) 100%);
            color: #fecaca; 
            border-color: rgba(220, 38, 38, 0.5);
            box-shadow: 0 4px 15px rgba(220, 38, 38, 0.2);
        }
        .activity-moderate { 
            background: linear-gradient(135deg, rgba(245, 158, 11, 0.3) 0%, rgba(217, 119, 6, 0.4) 100%);
            color: #fed7aa; 
            border-color: rgba(245, 158, 11, 0.5);
            box-shadow: 0 4px 15px rgba(245, 158, 11, 0.2);
        }
        .activity-low { 
            background: linear-gradient(135deg, rgba(34, 197, 94, 0.3) 0%, rgba(22, 163, 74, 0.4) 100%);
            color: #bbf7d0; 
            border-color: rgba(34, 197, 94, 0.5);
            box-shadow: 0 4px 15px rgba(34, 197, 94, 0.2);
        }
        
        /* Enhanced link styling */
        .event-item a {
            color: #60a5fa;
            text-decoration: none;
            transition: all 0.3s ease;
            padding: 4px 8px;
            border-radius: 6px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        
        .event-item a:hover {
            color: #93c5fd;
            background: rgba(59, 130, 246, 0.2);
            transform: translateX(4px);
        }
        
        /* Scrollbar styling */
        ::-webkit-scrollbar {
            width: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: rgba(15, 23, 42, 0.8);
            border-radius: 4px;
        }
        
        ::-webkit-scrollbar-thumb {
            background: linear-gradient(135deg, rgba(100, 181, 246, 0.6) 0%, rgba(59, 130, 246, 0.8) 100%);
            border-radius: 4px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(135deg, rgba(100, 181, 246, 0.8) 0%, rgba(59, 130, 246, 1) 100%);
        }
        
        @media (max-width: 768px) {
            .space-weather-container {
                margin: 10px;
                padding: 20px;
            }
            
            .summary-stats {
                grid-template-columns: 1fr;
                gap: 15px;
            }
            
            .header-section {
                padding: 20px 15px;
            }
            
            .header-section h1 {
                font-size: 1.8rem;
            }
            
            .event-category {
                padding: 20px 15px;
                margin: 15px 0;
            }
            
            .stat-card {
                padding: 20px;
            }
            
            .stat-number {
                font-size: 2.2rem;
            }
        }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="space-weather-container">
            <div class="header-section">
                <h1><i class="fas fa-sun"></i> Space Weather Dashboard</h1>
                <p class="mb-0">Real-time space weather events from DONKI database</p>
                <button class="refresh-button mt-3" onclick="refreshData()">
                    <i class="fas fa-sync-alt"></i> Refresh Data
                </button>
            </div>

            <div id="loadingSpinner" class="loading-spinner">
                <div class="spinner-border" role="status">
                    <span class="visually-hidden">Loading space weather data...</span>
                </div>
            </div>

            <div id="errorMessage" class="error-message d-none">
                <h4><i class="fas fa-exclamation-triangle"></i> Error Loading Data</h4>
                <p id="errorText">Failed to load space weather data. Please try again.</p>
            </div>

            <div id="spaceWeatherContent" class="d-none">
                <!-- Summary Statistics -->
                <div class="summary-stats" id="summaryStats">
                    <!-- Statistics will be populated here -->
                </div>

                <!-- Space Weather Categories -->
                <div id="spaceWeatherCategories">
                    <!-- Categories will be populated here -->
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let spaceWeatherData = null;

        async function loadSpaceWeatherData() {
            try {
                showLoading();
                
                console.log('🌞 Fetching NASA space weather data...');
                const response = await fetch('/api/nasa/donki/space-weather');
                const data = await response.json();
                
                if (data.success) {
                    spaceWeatherData = data;
                    displaySpaceWeatherData(data);
                    hideLoading();
                    console.log('✅ Space weather data loaded successfully');
                } else {
                    throw new Error(data.error || 'Failed to load space weather data');
                }
            } catch (error) {
                console.error('❌ Error loading space weather data:', error);
                showError(error.message);
                hideLoading();
            }
        }

        function displaySpaceWeatherData(data) {
            const content = document.getElementById('spaceWeatherContent');
            const summaryStats = document.getElementById('summaryStats');
            const categories = document.getElementById('spaceWeatherCategories');
            
            // Display summary statistics
            const summary = data.summary;
            summaryStats.innerHTML = `
                <div class="stat-card">
                    <span class="stat-number">${summary.total_events}</span>
                    <div>Total Events</div>
                </div>
                <div class="stat-card">
                    <span class="stat-number">${summary.most_active_category}</span>
                    <div>Most Active</div>
                </div>
                <div class="stat-card">
                    <span class="activity-level activity-${summary.recent_activity_level.toLowerCase()}">${summary.recent_activity_level}</span>
                    <div>Activity Level</div>
                </div>
                <div class="stat-card">
                    <span class="stat-number">${data.date}</span>
                    <div>Data Date</div>
                </div>
            `;
            
            // Display categories
            const spaceWeather = data.space_weather;
            let categoriesHtml = '';
            
            // Solar Flares
            if (spaceWeather.solar_flares.count > 0) {
                categoriesHtml += createCategorySection('Solar Flares', 'fa-fire', spaceWeather.solar_flares);
            }
            
            // Coronal Mass Ejections
            if (spaceWeather.coronal_mass_ejections.count > 0) {
                categoriesHtml += createCategorySection('Coronal Mass Ejections', 'fa-explosion', spaceWeather.coronal_mass_ejections);
            }
            
            // Geomagnetic Storms
            if (spaceWeather.geomagnetic_storms.count > 0) {
                categoriesHtml += createCategorySection('Geomagnetic Storms', 'fa-bolt', spaceWeather.geomagnetic_storms);
            }
            
            // Solar Energetic Particles
            if (spaceWeather.solar_energetic_particles.count > 0) {
                categoriesHtml += createCategorySection('Solar Energetic Particles', 'fa-atom', spaceWeather.solar_energetic_particles);
            }
            
            // Other categories with events
            Object.entries(spaceWeather).forEach(([key, category]) => {
                if (category.count > 0 && !['solar_flares', 'coronal_mass_ejections', 'geomagnetic_storms', 'solar_energetic_particles'].includes(key)) {
                    const title = key.split('_').map(word => word.charAt(0).toUpperCase() + word.slice(1)).join(' ');
                    categoriesHtml += createCategorySection(title, 'fa-satellite', category);
                }
            });
            
            if (!categoriesHtml) {
                categoriesHtml = '<div class="event-category"><h3>No Recent Space Weather Events</h3><p>No significant space weather events detected in the past 30 days.</p></div>';
            }
            
            categories.innerHTML = categoriesHtml;
            content.classList.remove('d-none');
        }

        function createCategorySection(title, icon, categoryData) {
            let eventsHtml = '';
            
            categoryData.events.forEach(event => {
                let eventDetails = '';
                
                // Format event details based on type
                if (event.flare_id) {
                    eventDetails = `
                        <strong>Class:</strong> ${event.class_type}<br>
                        <strong>Peak Time:</strong> ${formatDateTime(event.peak_time)}<br>
                        <strong>Location:</strong> ${event.source_location || 'Unknown'}
                    `;
                } else if (event.activity_id) {
                    eventDetails = `
                        <strong>Start Time:</strong> ${formatDateTime(event.start_time)}<br>
                        <strong>Location:</strong> ${event.source_location || 'Unknown'}<br>
                        <strong>Instruments:</strong> ${event.instruments.join(', ') || 'Unknown'}
                    `;
                } else if (event.gst_id) {
                    eventDetails = `
                        <strong>Start Time:</strong> ${formatDateTime(event.start_time)}<br>
                        <strong>Kp Index:</strong> ${event.all_kp_index.length} measurements
                    `;
                } else {
                    eventDetails = `
                        <strong>Event Time:</strong> ${formatDateTime(event.event_time || event.start_time)}<br>
                        <strong>Instruments:</strong> ${event.instruments ? event.instruments.join(', ') : 'Unknown'}
                    `;
                }
                
                eventsHtml += `
                    <div class="event-item">
                        ${eventDetails}
                        ${event.link ? `<br><a href="${event.link}" target="_blank"><i class="fas fa-external-link-alt"></i> More Details</a>` : ''}
                    </div>
                `;
            });
            
            return `
                <div class="event-category">
                    <h3><i class="fas ${icon}"></i> ${title} (${categoryData.count})</h3>
                    ${eventsHtml}
                </div>
            `;
        }

        function formatDateTime(dateTimeStr) {
            if (!dateTimeStr) return 'Unknown';
            
            try {
                const date = new Date(dateTimeStr);
                return date.toLocaleString();
            } catch (e) {
                return dateTimeStr;
            }
        }

        function showLoading() {
            document.getElementById('loadingSpinner').classList.remove('d-none');
            document.getElementById('errorMessage').classList.add('d-none');
            document.getElementById('spaceWeatherContent').classList.add('d-none');
        }

        function hideLoading() {
            document.getElementById('loadingSpinner').classList.add('d-none');
        }

        function showError(message) {
            document.getElementById('errorText').textContent = message;
            document.getElementById('errorMessage').classList.remove('d-none');
            document.getElementById('spaceWeatherContent').classList.add('d-none');
        }

        function refreshData() {
            loadSpaceWeatherData();
        }

        // Load data when page loads
        document.addEventListener('DOMContentLoaded', loadSpaceWeatherData);
    </script>
<script>
if ("serviceWorker" in navigator) {
  window.addEventListener("load", function() {
    navigator.serviceWorker.register("/static/service-worker.js").catch(function() {});
  });
}
</script>
</body>
</html>
