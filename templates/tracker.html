<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Satellite Tracker - Live Tracking</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.replit.com/agent/bootstrap-agent-dark-theme.min.css" rel="stylesheet">
    
    <!-- Cesium CSS -->
    <link href="https://cesium.com/downloads/cesiumjs/releases/1.99/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
    
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Custom CSS -->
    <style>
        /* Enhanced performance-focused styles */
        body {
            height: 100vh;
            overflow: hidden;
            background: linear-gradient(135deg, #0c0c0c 0%, #1a1a2e 50%, #16213e 100%);
        }

        .sidebar {
            height: 100vh;
            overflow-y: auto;
            background: linear-gradient(180deg, rgba(26, 26, 46, 0.95) 0%, rgba(12, 12, 12, 0.95) 100%);
            border-right: 1px solid rgba(100, 181, 246, 0.2);
            backdrop-filter: blur(10px);
            box-shadow: 2px 0 20px rgba(0, 0, 0, 0.5);
        }

        .cesium-container {
            height: 100vh;
            position: relative;
            background: radial-gradient(circle at center, #1a1a2e 0%, #0c0c0c 100%);
        }

        .loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(0, 0, 0, 0.9) 0%, rgba(26, 26, 46, 0.9) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            color: white;
            backdrop-filter: blur(15px);
        }

        .controls-overlay {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 100;
        }

        .status-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(90deg, rgba(0, 0, 0, 0.8) 0%, rgba(26, 26, 46, 0.8) 100%);
            color: white;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            backdrop-filter: blur(10px);
            z-index: 100;
            border-top: 1px solid rgba(100, 181, 246, 0.2);
        }

        .satellite-info, .pass-info {
            background: linear-gradient(135deg, rgba(26, 26, 46, 0.9) 0%, rgba(12, 12, 12, 0.9) 100%);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid rgba(100, 181, 246, 0.3);
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .category-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            margin: 6px 0;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 1px solid transparent;
            background: rgba(255, 255, 255, 0.02);
        }

        .category-item:hover {
            background: linear-gradient(135deg, rgba(100, 181, 246, 0.1) 0%, rgba(66, 165, 245, 0.1) 100%);
            border-color: rgba(100, 181, 246, 0.3);
            transform: translateX(5px);
        }

        .category-item.active {
            border-color: #64b5f6;
            background: linear-gradient(135deg, rgba(100, 181, 246, 0.2) 0%, rgba(66, 165, 245, 0.2) 100%);
            box-shadow: 0 4px 15px rgba(100, 181, 246, 0.2);
        }

        .category-color {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            margin-right: 12px;
            flex-shrink: 0;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
        }

        .search-result {
            padding: 12px 16px;
            margin: 4px 0;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            border-left: 3px solid transparent;
            background: rgba(255, 255, 255, 0.02);
        }

        .search-result:hover {
            background: rgba(100, 181, 246, 0.1);
            border-left-color: #64b5f6;
        }

        .satellite-section {
            background: rgba(255, 255, 255, 0.02);
            border-radius: 8px;
            padding: 12px;
            border-left: 3px solid rgba(100, 181, 246, 0.3);
        }

        .text-cyan {
            color: #4ECDC4 !important;
        }

        .navbar {
            background: linear-gradient(90deg, rgba(0, 0, 0, 0.9) 0%, rgba(26, 26, 46, 0.9) 100%) !important;
            backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(100, 181, 246, 0.2);
        }

        .btn-glow {
            box-shadow: 0 0 20px rgba(100, 181, 246, 0.3);
            border-color: #64b5f6;
        }

        .btn-glow:hover {
            box-shadow: 0 0 25px rgba(100, 181, 246, 0.5);
            transform: translateY(-2px);
        }

        /* Cesium widget enhancements */
        .cesium-widget-credits {
            display: none !important;
        }

        .cesium-viewer-toolbar {
            background: rgba(0, 0, 0, 0.8) !important;
            border-radius: 12px !important;
            margin: 15px !important;
            backdrop-filter: blur(10px) !important;
            border: 1px solid rgba(100, 181, 246, 0.2) !important;
        }

        .cesium-button {
            background: transparent !important;
            border: 1px solid rgba(255, 255, 255, 0.2) !important;
            border-radius: 8px !important;
            transition: all 0.3s ease !important;
        }

        .cesium-button:hover {
            background: rgba(100, 181, 246, 0.2) !important;
            border-color: #64b5f6 !important;
        }

        /* Enhanced scrollbar */
        .sidebar::-webkit-scrollbar {
            width: 8px;
        }

        .sidebar::-webkit-scrollbar-track {
            background: rgba(26, 26, 46, 0.5);
            border-radius: 4px;
        }

        .sidebar::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, #64b5f6, #42a5f5);
            border-radius: 4px;
        }

        .sidebar::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(180deg, #42a5f5, #1e88e5);
        }

        /* Loading animation */
        @keyframes pulse-glow {
            0%, 100% { 
                opacity: 1; 
                box-shadow: 0 0 20px rgba(100, 181, 246, 0.3);
            }
            50% { 
                opacity: 0.7; 
                box-shadow: 0 0 40px rgba(100, 181, 246, 0.6);
            }
        }

        .loading-overlay .spinner-border {
            animation: pulse-glow 2s ease-in-out infinite;
            border-color: #64b5f6;
            border-right-color: transparent;
        }

        /* Mobile optimizations */
        @media (max-width: 768px) {
            .sidebar {
                height: auto;
                max-height: 40vh;
            }
            
            .cesium-container {
                height: 60vh;
            }
            
            .controls-overlay {
                top: 10px;
                right: 10px;
            }
            
            .status-bar {
                padding: 10px 15px;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" href="#">
                <i class="fas fa-satellite-dish me-2"></i>
                3D Satellite Tracker
                <small class="text-muted ms-2">Live</small>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <button class="btn btn-outline-primary btn-glow me-2" id="refreshBtn">
                            <i class="fas fa-sync-alt"></i> Refresh
                        </button>
                    </li>
                    <li class="nav-item">
                        <button class="btn btn-outline-info btn-glow me-2" id="locationBtn">
                            <i class="fas fa-map-marker-alt"></i> Location
                        </button>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container-fluid p-0">
        <div class="row g-0">
            <!-- Sidebar -->
            <div class="col-md-3 sidebar">
                <div class="p-3">
                    <!-- Performance Monitor -->
                    <div class="mb-4">
                        <h6 class="text-info mb-3">
                            <i class="fas fa-tachometer-alt me-2"></i>Performance
                        </h6>
            
                        <div class="d-flex justify-content-between text-small">
                            <span>Update Rate:</span>
                            <span class="text-success" id="updateRate">5s</span>
                        </div>
                    </div>

                    <!-- Satellite Categories -->
                    <div class="mb-4">
                        <h6 class="text-info mb-3">
                            <i class="fas fa-layer-group me-2"></i>Categories
                        </h6>
                        <div id="categoriesList" class="mb-3">
                            <!-- Categories will be populated by JavaScript -->
                        </div>
                    </div>

                    <!-- Satellite Search -->
                    <div class="mb-4">
                        <h6 class="text-info mb-3">
                            <i class="fas fa-search me-2"></i>Search Satellites
                        </h6>
                        <input type="text" class="form-control mb-2" id="satelliteSearch" placeholder="Search by name...">
                        <div id="searchResults" class="mt-2">
                            <!-- Search results will appear here -->
                        </div>
                    </div>

                    <!-- Selected Satellite Info -->
                    <div id="satelliteInfo" class="satellite-info" style="display: none;">
                        <h6 class="text-info mb-3">
                            <i class="fas fa-info-circle me-2"></i>Satellite Details
                        </h6>
                        <div id="satelliteDetails">
                            <!-- Satellite details will be populated here -->
                        </div>
                    </div>

                    <!-- Pass Predictions -->
                    <div id="passInfo" class="pass-info" style="display: none;">
                        <h6 class="text-info mb-3">
                            <i class="fas fa-clock me-2"></i>Next Passes
                        </h6>
                        <div id="passPredictions">
                            <!-- Pass predictions will be populated here -->
                        </div>
                    </div>
                </div>
            </div>

            <!-- 3D Globe -->
            <div class="col-md-9">
                <div id="cesiumContainer" class="cesium-container">
                    <!-- Cesium globe will be rendered here -->
                </div>
                
            
                
                <!-- Loading Overlay - Hidden by default for smooth experience -->
                <div id="loadingOverlay" class="loading-overlay" style="display: none;">
                    <div class="text-center">
                        <div class="spinner-border mb-3" role="status" style="width: 3rem; height: 3rem;">
                            <span class="visually-hidden">Loading...</span>
                        </div>
                        <h5 class="text-info">Initializing Satellite Tracker</h5>
                        <p class="text-muted">Loading real-time satellite data and 3D visualization</p>
                    </div>
                </div>

                <!-- Controls Overlay -->
                <div class="controls-overlay">
                    <div class="btn-group-vertical" role="group">
                        <button type="button" class="btn btn-outline-light btn-sm mb-1" id="homeBtn" title="Reset View">
                            <i class="fas fa-home"></i>
                        </button>
                        <button type="button" class="btn btn-outline-light btn-sm mb-1" id="trackingBtn" title="Toggle Tracking">
                            <i class="fas fa-crosshairs"></i>
                        </button>
                        <button type="button" class="btn btn-outline-light btn-sm" id="orbitsBtn" title="Toggle Orbits">
                            <i class="fas fa-circle-notch"></i>
                        </button>
                    </div>
                </div>

                <!-- Status Bar -->
                <div class="status-bar">
                    <span id="satelliteCount" class="badge bg-primary me-3">
                        <span id="satCount">0</span> satellites
                    </span>
                    <span id="lastUpdate" class="text-muted small">Last updated: Never</span>
                    <span id="connectionStatus" class="badge bg-success ms-auto">Connected</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Location Modal -->
    <div class="modal fade" id="locationModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content bg-dark">
                <div class="modal-header border-secondary">
                    <h5 class="modal-title text-info">Set Your Location</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="locationForm">
                        <div class="mb-3">
                            <label for="latitude" class="form-label">Latitude</label>
                            <input type="number" class="form-control" id="latitude" step="0.000001" min="-90" max="90" required>
                        </div>
                        <div class="mb-3">
                            <label for="longitude" class="form-label">Longitude</label>
                            <input type="number" class="form-control" id="longitude" step="0.000001" min="-180" max="180" required>
                        </div>
                        <div class="mb-3">
                            <label for="altitude" class="form-label">Altitude (meters)</label>
                            <input type="number" class="form-control" id="altitude" value="0" min="0">
                        </div>
                        <div class="mb-3">
                            <button type="button" class="btn btn-outline-info btn-glow" id="autoLocationBtn">
                                <i class="fas fa-location-arrow me-2"></i>Use Current Location
                            </button>
                        </div>
                    </form>
                </div>
                <div class="modal-footer border-secondary">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary btn-glow" id="saveLocationBtn">Save Location</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Error Toast -->
    <div class="toast-container position-fixed bottom-0 end-0 p-3">
        <div id="errorToast" class="toast" role="alert">
            <div class="toast-header bg-dark text-warning">
                <i class="fas fa-exclamation-triangle me-2"></i>
                <strong class="me-auto">Warning</strong>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="toast"></button>
            </div>
            <div class="toast-body bg-dark text-white" id="errorMessage">
                <!-- Error message will be populated here -->
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cesium.com/downloads/cesiumjs/releases/1.99/Build/Cesium/Cesium.js"></script>
    <script src="{{ url_for('static', filename='js/satellite-viewer-enhanced.js') }}"></script>
</body>
</html>
